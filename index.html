<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ecf3fa" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0f1117" media="(prefers-color-scheme: dark)" />
  <meta name="description" content="Интерактивный блок прогресса для мобильных web-приложений" />
  <title>Progress Block</title>
  <link rel="stylesheet" href="progress.css" />
</head>
<body>
  <div class="container">
    <div class="progress-wrapper">
      <!-- кнопка-глаз снаружи блока: visibility:hidden на блоке не наследуется на неё -->
      <button id="restoreBtn" class="restore-btn" hidden aria-label="Показать блок">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
      <div id="progressBlock" class="progress-block">
        <div class="progress-title">Progress</div>
        <div class="progress-content">
          <div class="progress-ring">
            <!-- r и cx/cy соответствуют RADIUS из constants.js, viewBox масштабируется через CSS --ring-size -->
            <svg viewBox="0 0 120 120" width="100%" height="100%">
              <circle class="bg" cx="60" cy="60" r="50" />
              <circle class="fg" cx="60" cy="60" r="50" />
            </svg>
          </div>
          <div class="controls">
            <label>
              <input type="number" id="valueInput" min="0" max="100" value="0" inputmode="numeric" pattern="[0-9]*" aria-label="Значение прогресса" />
              Value
            </label>
            <label>
              <input type="checkbox" id="animateToggle" />
              Animate
            </label>
            <label>
              <input type="checkbox" id="hideToggle" />
              Hide
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
